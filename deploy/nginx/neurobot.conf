server {
    listen 80;
    server_name uppetitgpt.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name uppetitgpt.ru;

    ssl_certificate     /etc/letsencrypt/live/uppetitgpt.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/uppetitgpt.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    # API
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Service worker — NEVER cache
    location = /sw.js {
        root /opt/neurobot/frontend/dist;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Manifest — no cache
    location = /manifest.webmanifest {
        root /opt/neurobot/frontend/dist;
        add_header Cache-Control "no-cache";
        expires 0;
    }

    # Hashed assets — long cache (filenames change on rebuild)
    location /assets/ {
        root /opt/neurobot/frontend/dist;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Fonts & icons — long cache
    location /fonts/ {
        root /opt/neurobot/frontend/dist;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    location /icons/ {
        root /opt/neurobot/frontend/dist;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # SPA — index.html must not be cached
    location / {
        root /opt/neurobot/frontend/dist;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
